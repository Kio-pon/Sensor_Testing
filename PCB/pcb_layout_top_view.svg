<rect x="320" y="195" width="95" height="55" rx="4" fill="#2D1B00" stroke="#EF9F27" stroke-width="0.8"/>
<text x="367" y="218" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">LM2596 #1</text>
<text x="367" y="233" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="10">11.1V → 5V</text>
<text x="367" y="244" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="9">VCC + STM32 power</text>

<rect x="430" y="195" width="95" height="55" rx="4" fill="#2D1B00" stroke="#EF9F27" stroke-width="0.8"/>
<text x="477" y="218" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">LM2596 #2</text>
<text x="477" y="233" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="10">11.1V → 3.3V</text>
<text x="477" y="244" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="9">I2C pull-ups / spare</text>

