<svg width="100%" viewBox="0 0 780 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PCB top-down layout for NERC robot carrier board — updated with all sensors</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- PCB BODY -->
<rect x="50" y="60" width="680" height="420" rx="4" fill="#0D2818" stroke="#40916C" stroke-width="1.5"/>

<!-- Mounting holes -->
<circle cx="70" cy="80" r="5" fill="none" stroke="#40916C" stroke-width="1"/>
<circle cx="710" cy="80" r="5" fill="none" stroke="#40916C" stroke-width="1"/>
<circle cx="70" cy="460" r="5" fill="none" stroke="#40916C" stroke-width="1"/>
<circle cx="710" cy="460" r="5" fill="none" stroke="#40916C" stroke-width="1"/>

<!-- PCB label -->
<text x="390" y="540" text-anchor="middle" fill="#40916C" font-family="monospace" font-size="11">150 × 100 mm · mount flat on chassis floor with M3 standoffs (10mm height)</text>

<!-- Zone divider -->
<line x1="300" y1="65" x2="300" y2="475" stroke="#40916C" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>

<!-- ===== DISCOVERY BOARD FOOTPRINT (left zone) ===== -->
<rect x="70" y="150" width="210" height="185" rx="4" fill="#0F3460" stroke="#378ADD" stroke-width="1"/>
<text x="175" y="228" text-anchor="middle" fill="#FAFDF5" font-family="monospace" font-size="13" font-weight="bold">STM32F3</text>
<text x="175" y="245" text-anchor="middle" fill="#FAFDF5" font-family="monospace" font-size="13" font-weight="bold">Discovery</text>
<text x="175" y="261" text-anchor="middle" fill="#85B7EB" font-family="monospace" font-size="10">plugs via 2×25 female headers</text>
<!-- header rows -->
<line x1="73" y1="165" x2="73" y2="322" stroke="#85B7EB" stroke-width="2" stroke-dasharray="3 3"/>
<line x1="277" y1="165" x2="277" y2="322" stroke="#85B7EB" stroke-width="2" stroke-dasharray="3 3"/>

<!-- ZONE LABELS -->
<text x="175" y="130" text-anchor="middle" fill="#378ADD" font-family="monospace" font-size="11">CONTROLLER ZONE</text>
<text x="510" y="130" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="11">DRIVER ZONE</text>

<!-- ===== POWER ZONE (bottom-left) ===== -->
<rect x="70" y="370" width="210" height="70" rx="4" fill="#1A0E00" stroke="#EF9F27" stroke-width="0.8"/>
<text x="175" y="398" text-anchor="middle" fill="#FAC775" font-family="monospace" font-size="11" font-weight="bold">POWER RAIL</text>
<text x="175" y="413" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="10">VBAT → VM pins (11.1V)</text>
<text x="175" y="426" text-anchor="middle" fill="#EF9F27" font-family="monospace" font-size="10">Buck#1 5V → VCC, STM32, sensors</text>

<!-- ===== TB6612FNG MODULES — 4 wheel drivers ===== -->
<!-- Front-Left -->
<rect x="320" y="80" width="90" height="75" rx="4" fill="#500000" stroke="#E24B4A" stroke-width="0.8"/>
<text x="365" y="107" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">TB6612 #1</text>
<text x="365" y="121" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="10">Front-Left</text>
<text x="365" y="134" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PWM:PA0 IN1:PE8 IN2:PE9</text>
<text x="365" y="146" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PARALLELED</text>

<!-- Front-Right -->
<rect x="430" y="80" width="90" height="75" rx="4" fill="#500000" stroke="#E24B4A" stroke-width="0.8"/>
