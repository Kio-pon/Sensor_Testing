<line x1="475" y1="155" x2="475" y2="80" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)" opacity="0.6"/>
<line x1="365" y1="320" x2="365" y2="462" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)" opacity="0.6"/>
