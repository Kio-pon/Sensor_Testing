<rect x="546" y="60" width="65" height="18" rx="2" fill="#26215C" stroke="#7F77DD" stroke-width="0.8"/>
<text x="578" y="73" text-anchor="middle" fill="#CECBF6" font-family="monospace" font-size="10">SRV2 PD13</text>

