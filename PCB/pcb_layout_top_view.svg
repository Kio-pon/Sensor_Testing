<text x="475" y="121" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="10">Front-Right</text>
<text x="475" y="134" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PWM:PA1 IN1:PE10 IN2:PE11</text>
<text x="475" y="146" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PARALLELED</text>

