<rect x="399" y="60" width="62" height="18" rx="2" fill="#165A1A" stroke="#52C45A" stroke-width="0.8"/>
<text x="430" y="73" text-anchor="middle" fill="#A8F0AC" font-family="monospace" font-size="10">Sharp#3 PC2</text>

