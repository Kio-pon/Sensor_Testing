<text x="365" y="347" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">TB6612 #3</text>
<text x="365" y="361" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="10">Rear-Left</text>
<text x="365" y="374" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PWM:PA2 IN1:PE12 IN2:PE13</text>
<text x="365" y="386" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PARALLELED</text>

<!-- Rear-Right -->
<rect x="430" y="320" width="90" height="75" rx="4" fill="#500000" stroke="#E24B4A" stroke-width="0.8"/>
<text x="475" y="347" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">TB6612 #4</text>
<text x="475" y="361" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="10">Rear-Right</text>
<text x="475" y="374" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PWM:PA3 IN1:PE14 IN2:PE15</text>
<text x="475" y="386" text-anchor="middle" fill="#E24B4A" font-family="monospace" font-size="9">PARALLELED</text>

<!-- ===== TB6612 #5 ARM + PUTTER ===== -->
<rect x="560" y="195" width="100" height="90" rx="4" fill="#1A3A00" stroke="#639922" stroke-width="0.8"/>
<text x="610" y="220" text-anchor="middle" fill="#C2C0B6" font-family="monospace" font-size="11">TB6612 #5</text>
<text x="610" y="235" text-anchor="middle" fill="#C0DD97" font-family="monospace" font-size="10">Arm + Putter</text>
<text x="610" y="249" text-anchor="middle" fill="#639922" font-family="monospace" font-size="9">A: PA6 PD0 PD1</text>
<text x="610" y="262" text-anchor="middle" fill="#639922" font-family="monospace" font-size="9">B: PA7 PD2 PD3</text>
<text x="610" y="275" text-anchor="middle" fill="#639922" font-family="monospace" font-size="9">NORMAL MODE</text>

