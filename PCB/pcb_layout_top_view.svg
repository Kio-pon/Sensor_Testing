<rect x="220" y="462" width="60" height="16" rx="2" fill="#1C1000" stroke="#BA7517" stroke-width="0.8"/>
<text x="250" y="474" text-anchor="middle" fill="#FAC775" font-family="monospace" font-size="10">M3 RL</text>

<rect x="290" y="462" width="60" height="16" rx="2" fill="#1C1000" stroke="#BA7517" stroke-width="0.8"/>
<text x="320" y="474" text-anchor="middle" fill="#FAC775" font-family="monospace" font-size="10">M4 RR</text>

<rect x="360" y="462" width="60" height="16" rx="2" fill="#1C1000" stroke="#BA7517" stroke-width="0.8"/>
<text x="390" y="474" text-anchor="middle" fill="#FAC775" font-family="monospace" font-size="10">M5 Arm</text>

<rect x="430" y="462" width="70" height="16" rx="2" fill="#1C1000" stroke="#BA7517" stroke-width="0.8"/>
<text x="465" y="474" text-anchor="middle" fill="#FAC775" font-family="monospace" font-size="10">M6 Putter</text>

